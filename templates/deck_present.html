<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ deck.title }} — mDeck</title>
  {% load static %}

  <!-- Theme + font injection (applied after all CSS via end-of-body style) -->
  <style id="deck-theme-style">
    body { margin: 0; overflow: hidden; background: {{ theme.bg }}; }
  </style>

  <!-- KaTeX (NO defer) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <!-- marked-katex-extension -->
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.0.0/lib/index.umd.js"></script>

  <!-- Reveal.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css">
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- mDeck CSS (design system vars + editor/controls) -->
  <link rel="stylesheet" href="{% static 'mdeck/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'mdeck/css/editor.css' %}">
  <style>
    /* Full-viewport present mode */
    html, body { height: 100%; }
    #mode-slideshow { position: fixed; inset: 0; }
    .reveal-container { position: fixed; inset: 0; }
  </style>
</head>
<body>

<div id="mode-slideshow">
  <div class="reveal-container">
    <div class="reveal">
      <div class="slides" id="reveal-slides"></div>
    </div>
  </div>

  <div id="slideshow-controls">
    <button class="ss-btn" id="btn-fullscreen" onclick="toggleFullscreen()" title="Fullscreen (F)">
      &#9990; Fullscreen
    </button>
    <button class="ss-btn" id="btn-laser" onclick="toggleLaser()" title="Laser pointer (L)">
      &#9676; Laser
    </button>
    <a href="{{ back_url }}" class="ss-btn" title="Exit presentation">&#10005; Exit</a>
  </div>
  <div id="laser-dot" class="hidden"></div>
</div>
<div id="toast" class="toast"></div>

<script src="{% static 'mdeck/js/app.js' %}"></script>
<script src="{% static 'mdeck/js/markdown.js' %}"></script>
<script src="{% static 'mdeck/js/slideshow.js' %}"></script>
<script src="{% static 'mdeck/js/shortcuts.js' %}"></script>

{{ deck.content|json_script:"deck-content" }}
<script>
  var currentMarkdown = JSON.parse(document.getElementById('deck-content').textContent);
  var currentMode = 'slideshow';
  var DECK_SLUG = "{{ deck.slug }}";

  var DECK_CONFIG = {
    bg:      "{{ theme.bg }}",
    text:    "{{ theme.text }}",
    accent:  "{{ theme.accent }}",
    codeBg:  "{{ theme.code_bg }}",
    fontCss: "{{ deck.font_css_value|escapejs }}",
    fontSize: {{ deck.font_size }}
  };

  window.onRevealReady = function (reveal) {
    var f = DECK_CONFIG.fontCss, sz = DECK_CONFIG.fontSize;
    var bg = DECK_CONFIG.bg, text = DECK_CONFIG.text, accent = DECK_CONFIG.accent, codeBg = DECK_CONFIG.codeBg;
    // Append to body so it comes after all <link> stylesheets in cascade order
    var style = document.getElementById('deck-reveal-style');
    if (!style) { style = document.createElement('style'); style.id = 'deck-reveal-style'; document.body.appendChild(style); }
    style.textContent = [
      '.reveal-viewport { background:' + bg + ' !important; }',
      '.reveal { background:' + bg + ' !important; color:' + text + ' !important;' +
        ' font-family:' + f + ' !important; font-size:' + sz + 'px !important; }',
      '.reveal *,.reveal .slides { font-family:' + f + ' !important; }',
      '.reveal h1,.reveal h2,.reveal h3,.reveal h4 { color:' + accent + ' !important; }',
      '.reveal p,.reveal li,.reveal td,.reveal th { color:' + text + ' !important; }',
      '.reveal strong { color:' + accent + ' !important; }',
      '.reveal .progress,.reveal .controls { color:' + accent + ' !important; }',
      '.reveal blockquote { background:' + codeBg + ' !important; border-left:3px solid ' + accent + ' !important; color:' + text + ' !important; }',
      '.reveal td,.reveal th { color:' + text + ' !important; border-color:' + codeBg + ' !important; }',
      '.reveal th { background:' + codeBg + ' !important; color:' + accent + ' !important; }',
    ].join('\n');
    reveal.layout();
  };

  setupMarked();
  renderSlideshow();
</script>
</body>
</html>
