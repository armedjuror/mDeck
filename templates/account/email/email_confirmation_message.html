<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your mDeck account</title>
</head>
<body style="margin:0;padding:0;background:#0f0f0f;font-family:'JetBrains Mono',monospace,sans-serif;color:#e0e0e0">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:48px 16px">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px">

          <!-- Logo -->
          <tr>
            <td style="padding-bottom:32px;text-align:center">
              <span style="font-size:24px;font-weight:700;letter-spacing:-1px;color:#e0e0e0">
                m<span style="color:#f2c14e">Deck</span>
              </span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:2px;padding:36px 40px">
              <p style="margin:0 0 8px;font-size:18px;font-weight:700;color:#e0e0e0">Verify your email</p>
              <p style="margin:0 0 28px;font-size:13px;color:#888;line-height:1.6">
                Hi {{ user.first_name|default:user.email }}, welcome to mDeck. Click the button below to activate your account.
              </p>
              <a href="{{ activate_url }}"
                 style="display:inline-block;background:#f2c14e;color:#0f1115;font-weight:700;font-size:13px;padding:11px 24px;text-decoration:none;border-radius:2px;letter-spacing:0.3px">
                Verify email address
              </a>
              <p style="margin:28px 0 0;font-size:11px;color:#555;line-height:1.6">
                Or copy this link into your browser:<br>
                <span style="color:#666;word-break:break-all">{{ activate_url }}</span>
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top:24px;text-align:center;font-size:11px;color:#555;line-height:1.6">
              Link expires in 3 days &middot; If you didn't sign up, ignore this email.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
