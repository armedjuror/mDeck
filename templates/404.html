{% extends "base.html" %}

{% block title %}404 — Not Found{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 104px);display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="text-align:center;max-width:400px">
    <div style="font-size:72px;font-weight:700;letter-spacing:-4px;color:var(--border);line-height:1;margin-bottom:16px">
      404
    </div>
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px">
      Page not found
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:32px;line-height:1.6">
      The page you're looking for doesn't exist or has been moved.
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <a href="/" class="btn btn-primary">Go home</a>
      <a href="{% url 'explore' %}" class="btn btn-secondary">Browse decks</a>
    </div>
  </div>
</div>
{% endblock %}
