<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slidenotes</title>
  <link rel="stylesheet" href="assets/style.css">

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <!-- marked-katex-extension -->
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.0.0/lib/index.umd.js"></script>

  <!-- CodeMirror 5 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>

  <!-- Reveal.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css">
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<!-- ── Header ── -->
<div class="note-header">
  <div class="container" style="max-width:100%;padding:0 0 0 24px;">
    <a href="index.html" class="note-back">← Back</a>
    <div class="note-title-wrap" id="note-title">Loading...</div>
    <div class="tab-bar">
      <button class="tab-btn" id="tab-edit"      onclick="switchMode('edit')">Edit <kbd>e</kbd></button>
      <button class="tab-btn active" id="tab-slideshow" onclick="switchMode('slideshow')">Slideshow <kbd>s</kbd></button>
      <button class="tab-btn" id="tab-pdf"       onclick="switchMode('pdf')">PDF <kbd>p</kbd></button>
    </div>
  </div>
</div>

<!-- ── Main area ── -->
<div id="main-area">

  <!-- Edit mode: [editor | divider | preview] stacked above a shared footer -->
  <div id="mode-edit" class="hidden">

    <div id="edit-content-area">

      <div id="editor-pane">
        <div id="editor-body">
          <textarea id="editor-textarea"></textarea>
        </div>
      </div>

      <div id="split-divider" class="hidden"></div>

      <div id="split-preview-pane" class="hidden">
        <div class="split-pane-header">
          Preview <span class="split-hint">live</span>
        </div>
        <div id="split-preview"></div>
      </div>

    </div><!-- /#edit-content-area -->

    <!-- Footer spans full width of both panes -->
    <div class="editor-footer">
      <button class="btn-preview-toggle" id="btn-preview-toggle" onclick="togglePreview()">
        ⊞ Preview
      </button>
      <span id="filename-wrap" class="filename-wrap hidden">
        <input type="text" id="filename-input" class="filename-input"
          placeholder="filename (e.g. my-note)" autocomplete="off" spellcheck="false">
        <button class="btn-discard" onclick="discardDraft()">Discard</button>
      </span>
      <button class="btn-save" onclick="saveNote()">Save &amp; Download <kbd>d</kbd></button>
    </div>

  </div><!-- /#mode-edit -->

  <!-- Slideshow mode -->
  <div id="mode-slideshow">
    <div class="reveal-container">
      <div class="reveal">
        <div class="slides" id="reveal-slides"></div>
      </div>
    </div>
    <!-- Controls overlay -->
    <div id="slideshow-controls">
      <button class="ss-btn" id="btn-fullscreen" onclick="toggleFullscreen()" title="Fullscreen (F)">
        ⛶ Fullscreen
      </button>
      <button class="ss-btn" id="btn-laser" onclick="toggleLaser()" title="Laser pointer (L)">
        ◎ Laser
      </button>
    </div>
    <!-- Laser dot -->
    <div id="laser-dot" class="hidden"></div>
  </div>

  <!-- PDF mode -->
  <div id="mode-pdf" class="hidden">
    <div class="container">
      <div class="pdf-actions">
        <span class="pdf-actions-info">Exports all slides as a continuous PDF document.</span>
        <button class="btn-pdf" id="btn-pdf" onclick="downloadPdf()">Download PDF</button>
      </div>
      <div id="pdf-render"></div>
    </div>
  </div>

</div><!-- /#main-area -->

<div id="toast" class="toast"></div>

<script src="assets/app.js"></script>
<script>
(function () {

  // ── State ──────────────────────────────────────────────────────────────────

  var filename    = '';
  var isNewNote   = false;
  var currentMarkdown = '';
  var editor      = null;
  var editorReady = false;
  var revealInst  = null;
  var revealReady = false;
  var currentMode = 'slideshow';
  var previewOpen = false;
  var splitPct    = 50;
  var dragging    = false;
  var laserOn     = false;
  var draftKey    = 'slidenotes_draft';
  var draftTimer  = null;
  var previewTimer = null;

  // ── Boot ───────────────────────────────────────────────────────────────────

  var params = new URLSearchParams(window.location.search);
  filename  = params.get('file') || '';
  isNewNote = params.get('new') === '1';

  if (isNewNote) {
    currentMode = 'edit';
    document.title = 'New Note — slidenotes';
    document.getElementById('note-title').textContent = 'New Note';
    document.getElementById('filename-wrap').classList.remove('hidden');
    currentMarkdown = localStorage.getItem(draftKey) || '';
    applyMode('edit');
    ensureEditor();
    setTimeout(function () { if (!previewOpen) togglePreview(); }, 30);
  } else if (filename) {
    fetch('notes/' + filename)
      .then(function (r) { if (!r.ok) throw new Error(); return r.text(); })
      .then(function (md) {
        currentMarkdown = md;
        document.title = filename.replace(/\.md$/, '') + ' — slidenotes';
        var m = md.match(/^##?\s+(.+)/m);
        document.getElementById('note-title').textContent =
          m ? m[1].replace(/\*+/g, '') : filename;
        renderSlideshow();
      })
      .catch(function () {
        document.getElementById('note-title').textContent = 'Error loading note';
      });
  } else {
    document.getElementById('note-title').textContent = 'No file specified';
  }

  // ── Mode switching ─────────────────────────────────────────────────────────

  window.switchMode = function (mode) {
    if (mode === currentMode) return;
    if (editorReady && editor) currentMarkdown = editor.getValue();

    // Turn off laser when leaving slideshow
    if (currentMode === 'slideshow' && laserOn) setLaser(false);

    currentMode = mode;
    applyMode(mode);

    if (mode === 'edit') {
      ensureEditor();
      setTimeout(function () {
        if (editor) { editor.refresh(); editor.focus(); }
        if (!previewOpen) togglePreview();
        else renderPreview();
      }, 30);
    } else if (mode === 'slideshow') {
      renderSlideshow();
    } else if (mode === 'pdf') {
      renderPdf();
    }
  };

  function applyMode(mode) {
    ['edit', 'slideshow', 'pdf'].forEach(function (m) {
      document.getElementById('tab-' + m).classList.toggle('active', m === mode);
      document.getElementById('mode-' + m).classList.toggle('hidden', m !== mode);
    });
  }

  // ── Preview toggle (inside Edit mode) ─────────────────────────────────────

  window.togglePreview = function () {
    previewOpen = !previewOpen;
    var divider  = document.getElementById('split-divider');
    var pane     = document.getElementById('split-preview-pane');
    var btn      = document.getElementById('btn-preview-toggle');
    var epane    = document.getElementById('editor-pane');

    if (previewOpen) {
      divider.classList.remove('hidden');
      pane.classList.remove('hidden');
      epane.style.flex = '0 0 ' + splitPct + '%';
      btn.classList.add('active');
      btn.textContent = '⊟ Preview';
      renderPreview();
    } else {
      divider.classList.add('hidden');
      pane.classList.add('hidden');
      epane.style.flex = '';
      btn.classList.remove('active');
      btn.textContent = '⊞ Preview';
    }
    setTimeout(function () { if (editor) editor.refresh(); }, 30);
  };

  // ── Draggable divider ──────────────────────────────────────────────────────

  document.getElementById('split-divider').addEventListener('mousedown', function (e) {
    dragging = true;
    document.getElementById('split-divider').classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var rect = document.getElementById('mode-edit').getBoundingClientRect();
    splitPct = Math.max(20, Math.min(80, ((e.clientX - rect.left) / rect.width) * 100));
    document.getElementById('editor-pane').style.flex = '0 0 ' + splitPct + '%';
    if (editor) editor.refresh();
    scalePreviewSlides();
  });

  document.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false;
    document.getElementById('split-divider').classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    if (editor) editor.refresh();
  });

  // ── CodeMirror ─────────────────────────────────────────────────────────────

  function ensureEditor() {
    if (editorReady) return;
    editorReady = true;
    editor = CodeMirror.fromTextArea(document.getElementById('editor-textarea'), {
      mode: 'markdown',
      theme: 'dracula',
      lineNumbers: true,
      lineWrapping: true,
      autofocus: false,
      indentWithTabs: false,
      tabSize: 2,
      extraKeys: {
        'Ctrl-S': saveNote,
        'Cmd-S':  saveNote,
        'Esc': function () { switchMode('slideshow'); }
      }
    });
    editor.setValue(currentMarkdown);

    editor.on('change', function () {
      if (previewOpen) {
        clearTimeout(previewTimer);
        previewTimer = setTimeout(renderPreview, 400);
      }
      if (isNewNote) {
        clearTimeout(draftTimer);
        draftTimer = setTimeout(function () {
          localStorage.setItem(draftKey, editor.getValue());
        }, 600);
      }
    });

    // ── Scroll sync (slide-aware) ──────────────────────────────────────────────
    var scrollLock = false;

    // Returns [{start, end}] line ranges for each slide in the editor
    function getSlideLineRanges() {
      var lines = editor.getValue().split('\n');
      var ranges = [];
      var start = 0;
      for (var i = 0; i < lines.length; i++) {
        if (lines[i].trim() === '---') {
          ranges.push({ start: start, end: i - 1 });
          start = i + 1;
        }
      }
      ranges.push({ start: start, end: lines.length - 1 });
      return ranges;
    }

    editor.on('scroll', function () {
      if (scrollLock || !previewOpen) return;
      var info = editor.getScrollInfo();
      // Which line is at the top of the visible editor area
      var topLine = editor.lineAtHeight(info.top, 'local');
      var ranges = getSlideLineRanges();
      // Find the slide that contains topLine
      var slideIdx = 0;
      for (var i = 0; i < ranges.length; i++) {
        if (topLine >= ranges[i].start) slideIdx = i;
        else break;
      }
      var wraps = document.querySelectorAll('#split-preview .sp-wrap');
      var preview = document.getElementById('split-preview');
      if (!wraps.length || slideIdx >= wraps.length) return;
      // Scroll preview so the matching slide card is at the top
      var wrap = wraps[slideIdx];
      var targetTop = wrap.getBoundingClientRect().top
        - preview.getBoundingClientRect().top
        + preview.scrollTop;
      scrollLock = true;
      preview.scrollTo({ top: targetTop, behavior: 'smooth' });
      setTimeout(function () { scrollLock = false; }, 300);
    });

    document.getElementById('split-preview').addEventListener('scroll', function () {
      if (scrollLock || !previewOpen) return;
      var preview = this;
      var wraps = preview.querySelectorAll('.sp-wrap');
      if (!wraps.length) return;
      var previewTop = preview.getBoundingClientRect().top;
      // Find which slide card is closest to the top of the preview pane
      var slideIdx = 0;
      var minDist = Infinity;
      for (var i = 0; i < wraps.length; i++) {
        var dist = Math.abs(wraps[i].getBoundingClientRect().top - previewTop);
        if (dist < minDist) { minDist = dist; slideIdx = i; }
      }
      var ranges = getSlideLineRanges();
      if (slideIdx >= ranges.length) return;
      // Scroll editor to the first line of that slide
      var coords = editor.charCoords({ line: ranges[slideIdx].start, ch: 0 }, 'local');
      scrollLock = true;
      editor.getScrollerElement().scrollTo({ top: coords.top, behavior: 'smooth' });
      setTimeout(function () { scrollLock = false; }, 300);
    });
  }

  // ── Marked + KaTeX (once) ──────────────────────────────────────────────────

  var markedReady = false;
  function setupMarked() {
    if (markedReady) return;
    markedReady = true;
    var renderer = new marked.Renderer();
    renderer.code = function (token) {
      var code = typeof token === 'object' ? (token.text || '') : token;
      var lang = typeof token === 'object' ? (token.lang || '') : (arguments[1] || '');
      var hi;
      try {
        hi = lang && hljs.getLanguage(lang)
          ? hljs.highlight(code, { language: lang, ignoreIllegals: true }).value
          : hljs.highlightAuto(code).value;
      } catch (e) {
        hi = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
      var lines = hi.split('\n');
      if (lines[lines.length - 1] === '') lines.pop();
      var body = lines.map(function (l, i) {
        return '<span class="cw-line"><span class="cw-ln">' + (i+1) +
               '</span><span class="cw-lc">' + l + '</span></span>';
      }).join('');
      return '<div class="code-window"><div class="cw-bar">' +
        '<span class="cw-dot" style="background:#ff5f57"></span>' +
        '<span class="cw-dot" style="background:#febc2e"></span>' +
        '<span class="cw-dot" style="background:#28c840"></span>' +
        (lang ? '<span class="cw-lang">' + lang + '</span>' : '') +
        '</div><pre class="cw-pre"><code>' + body + '</code></pre></div>';
    };
    marked.use({ renderer: renderer });
    marked.use(markedKatex({
      throwOnError: false, output: 'html',
      delimiters: [
        { left: '$$', right: '$$', display: true  },
        { left: '$',  right: '$',  display: false }
      ]
    }));
    marked.setOptions({ gfm: true, breaks: false });
  }

  function renderMd(md) { return marked.parse(md); }

  function splitSlides(md) {
    return md.split(/\n---\n/).map(function (s) { return s.trim(); }).filter(Boolean);
  }

  // ── Live preview — scale-down of real 960×700 slide ──────────────────────

  function renderPreview() {
    setupMarked();
    var md = (editorReady && editor) ? editor.getValue() : currentMarkdown;
    var slides = splitSlides(md);
    document.getElementById('split-preview').innerHTML =
      slides.map(function (s, i) {
        return '<div class="sp-wrap">' +
          '<div class="sp-num">Slide ' + (i+1) + ' / ' + slides.length + '</div>' +
          '<div class="sp-outer">' +
            '<div class="sp-scale-wrap">' +
              '<div class="sp-slide">' + renderMd(s) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    scalePreviewSlides();
  }

  function scalePreviewSlides() {
    document.querySelectorAll('.sp-outer').forEach(function (outer) {
      var w = outer.offsetWidth;
      if (!w) return;
      var wrap = outer.querySelector('.sp-scale-wrap');
      if (wrap) wrap.style.transform = 'scale(' + (w / 960) + ')';
    });
  }

  window.addEventListener('resize', function () {
    if (previewOpen) scalePreviewSlides();
  });

  // ── Slideshow ──────────────────────────────────────────────────────────────

  function renderSlideshow() {
    setupMarked();
    var slides = splitSlides(currentMarkdown);
    document.getElementById('reveal-slides').innerHTML =
      slides.map(function (s) { return '<section>' + renderMd(s) + '</section>'; }).join('');

    if (!revealReady) {
      revealReady = true;
      revealInst = new Reveal(document.querySelector('#mode-slideshow .reveal'), {
        hash: false, transition: 'fade', backgroundTransition: 'fade',
        center: true, controls: true, progress: true,
        slideNumber: 'c/t', keyboard: true, overview: true,
        embedded: true, margin: 0.08,
        width: 960, height: 700
      });
      revealInst.initialize().then(function () { revealInst.layout(); });
    } else {
      revealInst.sync();
      revealInst.layout();
      revealInst.slide(0);
    }
  }

  // ── Fullscreen ─────────────────────────────────────────────────────────────

  window.toggleFullscreen = function () {
    var el = document.getElementById('mode-slideshow');
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      el.requestFullscreen();
    }
  };

  document.addEventListener('fullscreenchange', function () {
    var btn = document.getElementById('btn-fullscreen');
    var isFs = !!document.fullscreenElement;
    btn.textContent = isFs ? '✕ Exit Full' : '⛶ Fullscreen';
    btn.classList.toggle('active', isFs);
    if (revealInst) setTimeout(function () { revealInst.layout(); }, 50);
  });

  // ── Laser pointer ──────────────────────────────────────────────────────────

  function setLaser(on) {
    laserOn = on;
    var dot = document.getElementById('laser-dot');
    var btn = document.getElementById('btn-laser');
    var ss  = document.getElementById('mode-slideshow');
    dot.classList.toggle('hidden', !on);
    btn.classList.toggle('active', on);
    ss.style.cursor = on ? 'none' : '';
  }

  window.toggleLaser = function () { setLaser(!laserOn); };

  document.addEventListener('mousemove', function (e) {
    if (!laserOn) return;
    var dot = document.getElementById('laser-dot');
    dot.style.left = e.clientX + 'px';
    dot.style.top  = e.clientY + 'px';
  });

  // ── PDF ────────────────────────────────────────────────────────────────────

  function renderPdf() {
    setupMarked();
    var slides = splitSlides(currentMarkdown);
    document.getElementById('pdf-render').innerHTML =
      slides.map(function (s) {
        return '<div class="slide-block">' + renderMd(s) + '</div>';
      }).join('');
  }

  window.downloadPdf = function () {
    var btn = document.getElementById('btn-pdf');
    btn.disabled = true; btn.textContent = 'Generating PDF...';
    html2pdf().set({
      margin: [12, 12, 12, 12],
      filename: (filename || 'note').replace(/\.md$/, '') + '.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(document.getElementById('pdf-render')).save()
      .then(function () {
        btn.disabled = false; btn.textContent = 'Download PDF';
        showToast('PDF downloaded');
      }).catch(function () {
        btn.disabled = false; btn.textContent = 'Download PDF';
        showToast('PDF generation failed');
      });
  };

  // ── Save ───────────────────────────────────────────────────────────────────

  window.saveNote = function () {
    if (!editorReady || !editor) { ensureEditor(); setTimeout(saveNote, 60); return; }
    var saveName = filename;
    if (isNewNote) {
      var val = document.getElementById('filename-input').value.trim();
      if (!val) { document.getElementById('filename-input').focus(); showToast('Enter a filename first'); return; }
      saveName = val.endsWith('.md') ? val : val + '.md';
    }
    var content = editor.getValue();
    currentMarkdown = content;
    var url = URL.createObjectURL(new Blob([content], { type: 'text/markdown;charset=utf-8' }));
    var a = document.createElement('a');
    a.href = url; a.download = saveName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    if (isNewNote) {
      localStorage.removeItem(draftKey);
      showToast('Downloaded — add to notes/ and update index.json');
    } else {
      showToast('Saved & downloaded');
    }
  };

  window.discardDraft = function () {
    if (!confirm('Discard this draft?')) return;
    localStorage.removeItem(draftKey);
    window.location.href = 'index.html';
  };

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────

  document.addEventListener('keydown', function (ev) {
    var tag = document.activeElement && document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (document.activeElement && document.activeElement.closest('.CodeMirror')) return;
    if (ev.ctrlKey || ev.metaKey || ev.altKey) return;

    switch (ev.key) {
      case 'e': ev.preventDefault(); switchMode('edit'); break;
      case 's': ev.preventDefault(); switchMode('slideshow'); break;
      case 'p': ev.preventDefault(); switchMode('pdf'); break;
      case 'd': ev.preventDefault(); saveNote(); break;
      case 'l':
        if (currentMode === 'slideshow') { ev.preventDefault(); toggleLaser(); }
        break;
      case 'f':
        if (currentMode === 'slideshow') { ev.preventDefault(); toggleFullscreen(); }
        break;
    }
  });

})();
</script>

</body>
</html>
